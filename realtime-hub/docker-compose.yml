version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: realtime-hub-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  chat-service:
    build: ./chat-service
    container_name: chat-service
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/realtime_chat
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me}
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - '8000:8000'
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: realtime_analytics
      CLIENT_ORIGIN: http://localhost:5173
      BINANCE_WS_URL: wss://stream.binance.com:9443/stream
      DEFAULT_SYMBOLS: btcusdt,ethusdt,solusdt
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: realtime-hub-frontend
    ports:
      - '5173:80'
    depends_on:
      - chat-service
      - analytics-service

volumes:
  mongo_data:
